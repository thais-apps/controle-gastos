<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle de Gastos</title>
<style>
:root {
  --bg: #0d0718; --bg2: #160b28; --card: rgba(34,22,55,.86); --text:#fff8ff;
  --muted:#bda8d7; --purple:#a855f7; --pink:#ec4899; --red:#fb7185;
  --border: rgba(255,255,255,.12); --shadow:0 24px 80px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(168,85,247,.32),transparent 34%),radial-gradient(circle at top right,rgba(236,72,153,.18),transparent 30%),linear-gradient(145deg,var(--bg),var(--bg2))}
.app{width:min(480px,100%);margin:0 auto;padding:22px 16px 96px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.eyebrow{margin:0 0 4px;color:var(--muted);font-size:13px}h1{margin:0;font-size:25px;letter-spacing:-.03em}h2{margin:0;font-size:18px}.icon-btn{width:42px;height:42px;border:1px solid var(--border);border-radius:16px;color:var(--text);background:rgba(255,255,255,.06);font-size:18px}
.hero-card,.card,.wallet-card{border:1px solid var(--border);background:linear-gradient(160deg,var(--card),rgba(23,13,39,.9));box-shadow:var(--shadow);backdrop-filter:blur(18px)}
.hero-card{border-radius:28px;padding:22px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}.hero-card p,.hero-card span{color:var(--muted);margin:0 0 6px;font-size:13px}.hero-card strong{font-size:34px;letter-spacing:-.05em}.hero-mini{text-align:right}.hero-mini b{display:block;color:var(--pink);font-size:18px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}.wallet-card{border-radius:24px;padding:16px;min-height:152px;position:relative;overflow:hidden}.wallet-icon{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:rgba(168,85,247,.18);margin-bottom:12px;font-size:20px}.wallet-card h3{margin:0 0 6px;font-size:15px}.remaining{margin:0;font-size:23px;font-weight:800;letter-spacing:-.04em}.meta{color:var(--muted);font-size:12px;margin-top:4px}.progress{height:8px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.1);margin-top:12px}.progress span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--pink))}
.card{border-radius:28px;padding:18px;margin-bottom:16px}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:14px}.section-title span{color:var(--muted);font-size:12px}.form{display:grid;gap:12px}label{display:grid;gap:6px;color:var(--muted);font-size:12px}input,select{width:100%;color:var(--text);background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:16px;padding:14px;font-size:15px;outline:none}.primary-btn{border:none;border-radius:18px;padding:15px;color:white;font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 12px 32px rgba(168,85,247,.28)}
.insights,.category-list,.expense-list{display:grid;gap:10px}.insight{border-radius:18px;padding:13px;background:rgba(255,255,255,.06);color:#f5eaff;line-height:1.35;font-size:14px}.category-row,.expense-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px;border-radius:18px;background:rgba(255,255,255,.055)}.category-emoji,.expense-emoji{width:38px;height:38px;display:grid;place-items:center;border-radius:14px;background:rgba(168,85,247,.18)}small{color:var(--muted)}.delete-btn{border:none;color:var(--red);background:rgba(251,113,133,.12);width:36px;height:36px;border-radius:14px;font-size:16px}.empty{text-align:center;color:var(--muted);padding:22px 10px}
.bottom-nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(448px,calc(100% - 24px));display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:10px;border:1px solid var(--border);border-radius:24px;background:rgba(18,10,31,.92);backdrop-filter:blur(18px);box-shadow:var(--shadow)}.bottom-nav button{border:none;background:transparent;color:var(--muted);font-size:11px;padding:8px 2px}.bottom-nav .active{color:white}.bottom-nav .plus{width:48px;height:48px;margin:-22px auto 0;border-radius:18px;color:white;font-size:28px;background:linear-gradient(135deg,var(--purple),var(--pink))}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);opacity:0;color:white;background:rgba(168,85,247,.95);padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);transition:.25s ease;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:360px){.quick-grid{grid-template-columns:1fr}.hero-card{display:grid;gap:14px}.hero-mini{text-align:left}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div><p class="eyebrow" id="todayLabel">Controle do mês</p><h1>Boa noite, Tha 🌙</h1></div><button class="icon-btn" id="resetMonthBtn" title="Limpar mês">↻</button></header>
<section class="hero-card"><div><p>Total restante</p><strong id="totalRemaining">R$ 0,00</strong></div><div class="hero-mini"><span>Usado</span><b id="totalSpent">R$ 0,00</b></div></section>
<section class="quick-grid" id="walletCards"></section>
<section class="card"><div class="section-title"><h2>Novo gasto rápido</h2><span>Escolhe o bloco e salva</span></div><form id="expenseForm" class="form"><label>Bloco<select id="walletSelect"></select></label><label>Descrição<input id="descriptionInput" type="text" placeholder="Ex: Uber escritório, Ração, Assaí..." required /></label><label>Valor<input id="amountInput" type="number" min="0.01" step="0.01" placeholder="0,00" required /></label><button class="primary-btn" type="submit">Adicionar gasto</button></form></section>
<section class="card"><div class="section-title"><h2>Dashboard</h2><span>O que está pegando</span></div><div class="insights" id="insights"></div><div class="category-list" id="categoryBreakdown"></div></section>
<section class="card"><div class="section-title"><h2>Lançamentos</h2><span>Toque no lixo para excluir</span></div><div class="expense-list" id="expenseList"></div></section>
<nav class="bottom-nav"><button class="active">Dashboard</button><button>Gastos</button><button class="plus">+</button><button>Metas</button><button>Mais</button></nav>
</div><div class="toast" id="toast">Gasto salvo 💜</div>
<script>
const wallets={latam:{name:"Latam (Outros)",short:"Latam",icon:"💳",limit:1107.40},uber:{name:"Uber Trabalho — Swile",short:"Uber Trabalho",icon:"🚗",limit:320},almoco:{name:"Almoço Trabalho — Swile",short:"Almoço Trabalho",icon:"🍽️",limit:230},lazer:{name:"Lazer — Swile",short:"Lazer Swile",icon:"✨",limit:800}};
const categoryRules=[{key:"pets",label:"Pets",emoji:"🐱",words:["ração","racao","areia","pet","vet","veterin","golden","pipicat","chuck","lana","venus","hyoga","jason"]},{key:"delivery",label:"Delivery",emoji:"🍔",words:["ifood","99 food","99food","rappi","keeta","delivery","pizza","hamburg","lanche","sushi"]},{key:"mercado",label:"Mercado",emoji:"🛒",words:["assaí","assai","mercado","supermercado","atacad","pão de açúcar","pao de acucar","extra","carrefour"]},{key:"farmacia",label:"Farmácia",emoji:"💊",words:["droga","farm","raia","drogasil","remédio","remedio"]},{key:"bebida",label:"Bebida",emoji:"🍻",words:["bebida","cerveja","ze delivery","zedelivery","vinho","bar","adega"]},{key:"assinaturas",label:"Assinaturas",emoji:"📺",words:["netflix","spotify","amazon","prime","apple","google","max","disney","crunchyroll"]}];
let expenses=JSON.parse(localStorage.getItem("tha_expenses_v1")||"[]");
const money=new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"});
const walletCards=document.getElementById("walletCards"),walletSelect=document.getElementById("walletSelect"),expenseForm=document.getElementById("expenseForm"),descriptionInput=document.getElementById("descriptionInput"),amountInput=document.getElementById("amountInput"),expenseList=document.getElementById("expenseList"),categoryBreakdown=document.getElementById("categoryBreakdown"),insights=document.getElementById("insights"),toast=document.getElementById("toast");
function save(){localStorage.setItem("tha_expenses_v1",JSON.stringify(expenses))}
function spentByWallet(k){return expenses.filter(e=>e.wallet===k).reduce((s,e)=>s+Number(e.amount),0)}
function getCategory(d,w){if(w==="uber")return{key:"uber",label:"Uber",emoji:"🚗"};if(w==="almoco")return{key:"almoco",label:"Almoço trabalho",emoji:"🍽️"};if(w==="lazer")return{key:"lazer",label:"Lazer Swile",emoji:"✨"};const n=d.toLowerCase();return categoryRules.find(r=>r.words.some(word=>n.includes(word)))||{key:"outros",label:"Outros Latam",emoji:"💳"}}
function render(){document.getElementById("todayLabel").textContent=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});walletSelect.innerHTML=Object.entries(wallets).map(([k,w])=>`<option value="${k}">${w.name}</option>`).join("");const totalLimit=Object.values(wallets).reduce((s,w)=>s+w.limit,0),totalSpent=expenses.reduce((s,e)=>s+Number(e.amount),0);document.getElementById("totalRemaining").textContent=money.format(totalLimit-totalSpent);document.getElementById("totalSpent").textContent=money.format(totalSpent);walletCards.innerHTML=Object.entries(wallets).map(([k,w])=>{const spent=spentByWallet(k),rem=w.limit-spent,p=Math.min(spent/w.limit*100,100);return `<article class="wallet-card"><div class="wallet-icon">${w.icon}</div><h3>${w.short}</h3><p class="remaining">${money.format(rem)}</p><div class="meta">${money.format(spent)} de ${money.format(w.limit)}</div><div class="progress"><span style="width:${p}%"></span></div><div class="meta">${Math.round(p)}% usado</div></article>`}).join("");renderExpenses();renderCategories();renderInsights()}
function renderExpenses(){expenseList.innerHTML=expenses.length?expenses.map(e=>{const w=wallets[e.wallet],c=getCategory(e.description,e.wallet);return `<div class="expense-row"><div class="expense-emoji">${c.emoji}</div><div><b>${e.description}</b><br><small>${e.date} • ${w.short}</small></div><div><b>${money.format(e.amount)}</b><button class="delete-btn" onclick="deleteExpense('${e.id}')">🗑</button></div></div>`}).join(""):`<div class="empty">Nenhum gasto lançado ainda. Tha disciplinada por enquanto. 💜</div>`}
function renderCategories(){const totals={};expenses.forEach(e=>{const c=getCategory(e.description,e.wallet);if(!totals[c.key])totals[c.key]={...c,total:0};totals[c.key].total+=Number(e.amount)});const sorted=Object.values(totals).sort((a,b)=>b.total-a.total);categoryBreakdown.innerHTML=sorted.length?sorted.map(c=>`<div class="category-row"><div class="category-emoji">${c.emoji}</div><div><b>${c.label}</b><br><small>${c.key==="delivery"?"Esse é o que vamos vigiar 👀":"Total do mês"}</small></div><b>${money.format(c.total)}</b></div>`).join(""):`<div class="empty">Quando você lançar gastos, o app separa por categoria aqui.</div>`}
function renderInsights(){const latam=spentByWallet("latam"),delivery=expenses.filter(e=>getCategory(e.description,e.wallet).key==="delivery").reduce((s,e)=>s+Number(e.amount),0),msgs=[];msgs.push(expenses.length?`Latam está em ${Math.round(latam/wallets.latam.limit*100)}% do limite livre.`:"Começo limpo. Agora é só lançar sem medo, porque o app faz a conta por você.");if(delivery>0)msgs.push(`Delivery já está em ${money.format(delivery)}. Ele não vai se esconder em “alimentação” aqui. 🍔`);msgs.push("Guardar R$ 1.500 é compromisso fixo do mês. Não é o que sobra: é prioridade. 💜");insights.innerHTML=msgs.map(m=>`<div class="insight">${m}</div>`).join("")}
function showToast(t="Gasto salvo 💜"){toast.textContent=t;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1800)}
expenseForm.addEventListener("submit",e=>{e.preventDefault();const wallet=walletSelect.value,description=descriptionInput.value.trim(),amount=Number(amountInput.value);if(!description||!amount||amount<=0)return;expenses.unshift({id:String(Date.now()),wallet,description,amount,date:new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})});save();expenseForm.reset();render();showToast()});
function deleteExpense(id){const e=expenses.find(x=>x.id===id);if(!e)return;if(!confirm(`Excluir "${e.description}" de ${money.format(e.amount)}?`))return;expenses=expenses.filter(x=>x.id!==id);save();render();showToast("Gasto excluído")}
document.getElementById("resetMonthBtn").addEventListener("click",()=>{if(confirm("Limpar todos os gastos lançados?")){expenses=[];save();render();showToast("Mês limpo")}});
render();
</script>
</body>
</html>
